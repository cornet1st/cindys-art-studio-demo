<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Claude Logos</title></head>
<body>

<div id="logo-1" data-name="House of C" data-name-zh="C之家" data-desc="Minimalist house silhouette with the letter C forming the doorway">
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#f9f7f4"/>
  <!-- House body -->
  <polygon points="60,18 20,48 20,100 100,100 100,48" fill="#6a9e8c"/>
  <!-- Roof accent -->
  <polygon points="60,18 20,48 100,48" fill="#3a5a42"/>
  <!-- C as door -->
  <path d="M72,68 A16,16 0 1,0 72,88" fill="none" stroke="#f9f7f4" stroke-width="6" stroke-linecap="round"/>
  <!-- Window left -->
  <rect x="30" y="56" width="14" height="14" rx="1" fill="#f9f7f4" opacity="0.9"/>
  <!-- Window right -->
  <rect x="80" y="56" width="14" height="14" rx="1" fill="#f9f7f4" opacity="0.9"/>
  <!-- Ground line -->
  <line x1="10" y1="100" x2="110" y2="100" stroke="#2c2c2c" stroke-width="1.5"/>
  <!-- Text -->
  <text x="60" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#2c2c2c" letter-spacing="3">CINDY'S ART</text>
</svg>
</div>

<div id="logo-2" data-name="Brush Roof" data-name-zh="筆屋" data-desc="Paintbrush forming the roofline of a simple house">
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#f9f7f4"/>
  <!-- Brush handle = roof left -->
  <line x1="15" y1="55" x2="60" y2="28" stroke="#b8956a" stroke-width="5" stroke-linecap="round"/>
  <!-- Brush tip = roof right -->
  <line x1="60" y1="28" x2="105" y2="55" stroke="#c57546" stroke-width="5" stroke-linecap="round"/>
  <!-- Brush bristles detail -->
  <path d="M96,50 L105,55 L100,58" fill="#c57546" stroke="none"/>
  <line x1="100" y1="50" x2="108" y2="56" stroke="#b8956a" stroke-width="1.5"/>
  <line x1="102" y1="48" x2="110" y2="54" stroke="#b8956a" stroke-width="1"/>
  <!-- House walls -->
  <rect x="25" y="55" width="70" height="40" fill="none" stroke="#2c2c2c" stroke-width="2"/>
  <!-- C door -->
  <path d="M68,72 A10,10 0 1,0 68,86" fill="none" stroke="#6a9e8c" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Window -->
  <rect x="34" y="64" width="12" height="12" fill="none" stroke="#2c2c2c" stroke-width="1.5"/>
  <line x1="40" y1="64" x2="40" y2="76" stroke="#2c2c2c" stroke-width="1"/>
  <line x1="34" y1="70" x2="46" y2="70" stroke="#2c2c2c" stroke-width="1"/>
  <!-- Text -->
  <text x="60" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="7.5" fill="#2c2c2c">Cindy's Art Studio</text>
</svg>
</div>

<div id="logo-3" data-name="Eastern Seal" data-name-zh="印章" data-desc="Traditional Chinese seal stamp style with C monogram">
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#f9f7f4"/>
  <!-- Outer seal border -->
  <rect x="20" y="15" width="80" height="80" rx="4" fill="none" stroke="#c57546" stroke-width="4"/>
  <!-- Inner border -->
  <rect x="27" y="22" width="66" height="66" rx="2" fill="none" stroke="#c57546" stroke-width="1.5"/>
  <!-- Large C character - seal style -->
  <path d="M72,38 C72,38 68,32 56,32 C42,32 35,42 35,55 C35,68 42,78 56,78 C68,78 72,72 72,72" fill="none" stroke="#c57546" stroke-width="6" stroke-linecap="square"/>
  <!-- Small house inside C -->
  <polygon points="56,46 48,52 48,62 64,62 64,52" fill="#c57546" opacity="0.6"/>
  <polygon points="56,46 48,52 64,52" fill="#c57546"/>
  <!-- Text below -->
  <text x="60" y="108" text-anchor="middle" font-family="'SimSun', 'Songti SC', serif" font-size="9" fill="#c57546">Cindy 畫室</text>
</svg>
</div>

<div id="logo-4" data-name="Geometric Fusion" data-name-zh="幾何融合" data-desc="Abstract geometric house made of triangles and circles with C">
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#2a3a4a"/>
  <!-- Geometric house shapes -->
  <polygon points="60,15 25,45 95,45" fill="#b8956a" opacity="0.9"/>
  <rect x="30" y="45" width="60" height="45" fill="#6a9e8c" opacity="0.8"/>
  <!-- C circle cutout -->
  <circle cx="60" cy="62" r="16" fill="#2a3a4a"/>
  <path d="M70,52 A16,16 0 1,0 70,72" fill="none" stroke="#b8956a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Accent triangles -->
  <polygon points="35,45 45,35 45,45" fill="#c57546" opacity="0.5"/>
  <polygon points="85,45 75,35 75,45" fill="#c57546" opacity="0.5"/>
  <!-- Small windows -->
  <circle cx="42" cy="55" r="4" fill="#2a3a4a" opacity="0.6"/>
  <circle cx="78" cy="55" r="4" fill="#2a3a4a" opacity="0.6"/>
  <!-- Text -->
  <text x="60" y="104" text-anchor="middle" font-family="'Helvetica Neue', sans-serif" font-size="6.5" fill="#f9f7f4" letter-spacing="4">CINDY'S ART</text>
</svg>
</div>

<div id="logo-5" data-name="Watercolor Home" data-name-zh="水彩之家" data-desc="Loose watercolor splashes forming a house with C motif">
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#f9f7f4"/>
  <!-- Watercolor blobs -->
  <ellipse cx="55" cy="60" rx="35" ry="30" fill="#6a9e8c" opacity="0.2"/>
  <ellipse cx="65" cy="55" rx="30" ry="28" fill="#d4836a" opacity="0.15"/>
  <ellipse cx="50" cy="65" rx="25" ry="20" fill="#b8956a" opacity="0.15"/>
  <!-- House outline - loose hand-drawn feel -->
  <path d="M35,55 L60,30 L85,55 L85,85 L35,85 Z" fill="none" stroke="#2c2c2c" stroke-width="2" stroke-linejoin="round" stroke-dasharray="0"/>
  <!-- Watercolor drip from roof -->
  <path d="M60,30 L60,22" stroke="#6a9e8c" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <circle cx="60" cy="20" r="2" fill="#6a9e8c" opacity="0.4"/>
  <!-- C as door -->
  <path d="M68,68 A11,11 0 1,0 68,80" fill="none" stroke="#c57546" stroke-width="3" stroke-linecap="round"/>
  <!-- Paint splatter dots -->
  <circle cx="28" cy="45" r="2.5" fill="#6a9e8c" opacity="0.3"/>
  <circle cx="92" cy="50" r="1.8" fill="#d4836a" opacity="0.3"/>
  <circle cx="25" cy="75" r="1.5" fill="#b8956a" opacity="0.4"/>
  <circle cx="95" cy="72" r="2" fill="#6a9e8c" opacity="0.25"/>
  <circle cx="75" cy="25" r="1.2" fill="#c57546" opacity="0.35"/>
  <!-- Text -->
  <text x="60" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#2c2c2c" font-style="italic">Cindy's Art Studio</text>
</svg>
</div>

<div id="logo-6" data-name="Badge Classic" data-name-zh="經典徽章" data-desc="Vintage circular badge with house icon and C monogram">
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#f9f7f4"/>
  <!-- Outer circle -->
  <circle cx="60" cy="58" r="48" fill="none" stroke="#2c2c2c" stroke-width="2.5"/>
  <circle cx="60" cy="58" r="44" fill="none" stroke="#2c2c2c" stroke-width="0.8"/>
  <!-- Top text on path -->
  <defs>
    <path id="topArc" d="M20,58 A40,40 0 0,1 100,58"/>
    <path id="bottomArc" d="M22,64 A42,42 0 0,0 98,64"/>
  </defs>
  <text font-family="Georgia, serif" font-size="7" fill="#2c2c2c" letter-spacing="2.5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">CINDY'S ART STUDIO</textPath>
  </text>
  <!-- Bottom text -->
  <text font-family="Georgia, serif" font-size="5.5" fill="#2c2c2c" letter-spacing="1.5">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">EST. 2004 - COQUITLAM</textPath>
  </text>
  <!-- Center house + C -->
  <polygon points="60,35 42,48 42,72 78,72 78,48" fill="#6a9e8c" opacity="0.15"/>
  <polygon points="60,35 40,50 80,50" fill="none" stroke="#6a9e8c" stroke-width="2"/>
  <rect x="42" y="50" width="36" height="22" fill="none" stroke="#6a9e8c" stroke-width="1.5"/>
  <path d="M66,56 A8,8 0 1,0 66,68" fill="none" stroke="#b8956a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stars -->
  <circle cx="30" cy="58" r="1.5" fill="#b8956a"/>
  <circle cx="90" cy="58" r="1.5" fill="#b8956a"/>
</svg>
</div>

<div id="logo-7" data-name="Origami House" data-name-zh="摺紙屋" data-desc="Paper fold origami-style house in flat geometric style">
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#f9f7f4"/>
  <!-- Origami house - folded paper look -->
  <!-- Left wall (shadow) -->
  <polygon points="30,52 60,32 60,90 30,90" fill="#6a9e8c"/>
  <!-- Right wall (lighter) -->
  <polygon points="60,32 90,52 90,90 60,90" fill="#8bb8a6"/>
  <!-- Left roof -->
  <polygon points="60,32 25,52 30,52" fill="#3a5a42"/>
  <!-- Right roof -->
  <polygon points="60,32 95,52 90,52" fill="#4a6a52"/>
  <!-- Fold line -->
  <line x1="60" y1="32" x2="60" y2="90" stroke="#f9f7f4" stroke-width="0.5" opacity="0.5"/>
  <!-- C on right side -->
  <path d="M74,62 A10,10 0 1,0 74,78" fill="none" stroke="#f9f7f4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Fold detail triangle -->
  <polygon points="90,52 95,52 90,57" fill="#6a9e8c" opacity="0.5"/>
  <!-- Window on left -->
  <rect x="38" y="60" width="10" height="10" fill="#3a5a42" opacity="0.4"/>
  <!-- Text -->
  <text x="60" y="106" text-anchor="middle" font-family="'Helvetica Neue', sans-serif" font-size="7" fill="#2c2c2c" font-weight="300" letter-spacing="2">CINDY'S ART</text>
</svg>
</div>

<div id="logo-8" data-name="Line Art Easel" data-name-zh="畫架線藝" data-desc="Single continuous line forming an easel with house canvas">
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#f9f7f4"/>
  <!-- Easel legs -->
  <line x1="35" y1="100" x2="55" y2="38" stroke="#2c2c2c" stroke-width="2" stroke-linecap="round"/>
  <line x1="85" y1="100" x2="65" y2="38" stroke="#2c2c2c" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="105" x2="60" y2="55" stroke="#2c2c2c" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Easel shelf -->
  <line x1="42" y1="72" x2="78" y2="72" stroke="#2c2c2c" stroke-width="2" stroke-linecap="round"/>
  <!-- Canvas with house -->
  <rect x="38" y="25" width="44" height="47" rx="1" fill="#f9f7f4" stroke="#2c2c2c" stroke-width="1.5"/>
  <!-- House on canvas -->
  <polygon points="60,33 46,44 74,44" fill="none" stroke="#6a9e8c" stroke-width="1.5"/>
  <rect x="48" y="44" width="24" height="20" fill="none" stroke="#6a9e8c" stroke-width="1.5"/>
  <!-- C as window -->
  <path d="M65,50 A6,6 0 1,0 65,58" fill="none" stroke="#c57546" stroke-width="2" stroke-linecap="round"/>
  <!-- Brush resting on shelf -->
  <line x1="80" y1="72" x2="88" y2="60" stroke="#b8956a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="89" cy="58.5" r="2" fill="#c57546"/>
  <!-- Text -->
  <text x="60" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#2c2c2c" letter-spacing="1">Cindy's Art Studio</text>
</svg>
</div>

<div id="logo-9" data-name="Monogram Shield" data-name-zh="字母盾" data-desc="Shield-shaped monogram with overlapping C and house roof">
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#2a3a4a"/>
  <!-- Shield shape -->
  <path d="M60,10 L95,30 L95,70 Q95,95 60,110 Q25,95 25,70 L25,30 Z" fill="#2a3a4a" stroke="#b8956a" stroke-width="2.5"/>
  <path d="M60,16 L90,34 L90,68 Q90,90 60,104 Q30,90 30,68 L30,34 Z" fill="none" stroke="#b8956a" stroke-width="0.8"/>
  <!-- Large C -->
  <path d="M74,42 C74,42 70,30 56,30 C40,30 34,42 34,58 C34,74 40,86 56,86 C70,86 74,74 74,74" fill="none" stroke="#f9f7f4" stroke-width="4" stroke-linecap="round"/>
  <!-- Roof inside C -->
  <polygon points="56,42 44,52 68,52" fill="none" stroke="#b8956a" stroke-width="1.5"/>
  <!-- Small vertical lines under roof -->
  <line x1="48" y1="52" x2="48" y2="62" stroke="#b8956a" stroke-width="1"/>
  <line x1="64" y1="52" x2="64" y2="62" stroke="#b8956a" stroke-width="1"/>
  <line x1="48" y1="62" x2="64" y2="62" stroke="#b8956a" stroke-width="1"/>
  <!-- Star accent -->
  <circle cx="56" cy="72" r="2" fill="#b8956a"/>
</svg>
</div>

<div id="logo-10" data-name="Palette Home" data-name-zh="調色盤之家" data-desc="Paint palette shape merged with house silhouette">
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#f9f7f4"/>
  <!-- Palette shape -->
  <path d="M60,15 C85,15 105,35 105,60 C105,82 90,100 68,100 L52,100 C30,100 15,82 15,60 C15,35 35,15 60,15 Z" fill="#f9f7f4" stroke="#2c2c2c" stroke-width="2"/>
  <!-- Thumb hole = C shape -->
  <path d="M46,55 A12,14 0 1,0 46,75" fill="none" stroke="#2c2c2c" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Paint dots = windows -->
  <circle cx="70" cy="32" r="6" fill="#c57546"/>
  <circle cx="85" cy="48" r="6" fill="#6a9e8c"/>
  <circle cx="88" cy="68" r="6" fill="#b8956a"/>
  <circle cx="75" cy="84" r="6" fill="#6b4c6e"/>
  <circle cx="55" cy="90" r="5" fill="#d4836a"/>
  <!-- House in center -->
  <polygon points="60,38 50,46 70,46" fill="none" stroke="#2c2c2c" stroke-width="1.5"/>
  <rect x="52" y="46" width="16" height="12" fill="none" stroke="#2c2c2c" stroke-width="1.2"/>
  <!-- Text -->
  <text x="60" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="6.5" fill="#2c2c2c">Cindy's Art Studio</text>
</svg>
</div>

<div id="logo-11" data-name="Negative Space C" data-name-zh="留白C" data-desc="C formed by negative space within a house shape">
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#f9f7f4"/>
  <!-- House filled shape with C cut out -->
  <defs>
    <mask id="cMask">
      <rect width="120" height="120" fill="white"/>
      <path d="M72,52 A18,18 0 1,0 72,82" fill="black" stroke="black" stroke-width="8" stroke-linecap="round"/>
    </mask>
  </defs>
  <!-- Full house -->
  <g mask="url(#cMask)">
    <polygon points="60,12 15,50 15,98 105,98 105,50" fill="#c57546"/>
    <polygon points="60,12 15,50 105,50" fill="#a5603a"/>
  </g>
  <!-- Subtle door -->
  <rect x="52" y="78" width="16" height="20" rx="8" fill="#f9f7f4" opacity="0.3"/>
  <!-- Text -->
  <text x="60" y="114" text-anchor="middle" font-family="'Helvetica Neue', sans-serif" font-size="6" fill="#2c2c2c" letter-spacing="3" font-weight="600">CINDY'S ART</text>
</svg>
</div>

<div id="logo-12" data-name="Calligraphic Flow" data-name-zh="書法流韻" data-desc="Flowing calligraphic C that transitions into a house form">
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#f9f7f4"/>
  <!-- Flowing calligraphic C that becomes roof -->
  <path d="M82,25 C70,18 40,20 30,40 C22,56 25,75 35,85 C42,92 55,95 65,90" fill="none" stroke="#2c2c2c" stroke-width="4" stroke-linecap="round"/>
  <!-- Brush thin-thick variation -->
  <path d="M82,25 C82,25 88,22 90,28" fill="none" stroke="#2c2c2c" stroke-width="2" stroke-linecap="round"/>
  <!-- House structure integrated -->
  <path d="M38,55 L55,40 L72,55 L72,78 L38,78 Z" fill="none" stroke="#6a9e8c" stroke-width="1.5"/>
  <!-- Window -->
  <circle cx="48" cy="62" r="5" fill="none" stroke="#6a9e8c" stroke-width="1.2"/>
  <!-- Door -->
  <rect x="58" y="66" width="8" height="12" rx="4" fill="none" stroke="#6a9e8c" stroke-width="1.2"/>
  <!-- Ink splash accents -->
  <circle cx="85" cy="30" r="1.5" fill="#2c2c2c" opacity="0.3"/>
  <circle cx="28" cy="88" r="2" fill="#2c2c2c" opacity="0.2"/>
  <!-- Text -->
  <text x="60" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#2c2c2c" font-style="italic">Cindy's Art Studio</text>
</svg>
</div>

<div id="logo-13" data-name="Stacked Blocks" data-name-zh="堆疊方塊" data-desc="Colorful stacked geometric blocks forming a house with C accent">
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#f9f7f4"/>
  <!-- Stacked blocks house -->
  <!-- Roof triangle -->
  <polygon points="60,18 30,45 90,45" fill="#c57546"/>
  <!-- Row 1 -->
  <rect x="30" y="45" width="20" height="18" fill="#6a9e8c"/>
  <rect x="50" y="45" width="20" height="18" fill="#b8956a"/>
  <rect x="70" y="45" width="20" height="18" fill="#6a9e8c"/>
  <!-- Row 2 -->
  <rect x="30" y="63" width="20" height="18" fill="#d4836a"/>
  <rect x="50" y="63" width="20" height="18" fill="#6a9e8c"/>
  <rect x="70" y="63" width="20" height="18" fill="#b8956a"/>
  <!-- Row 3 -->
  <rect x="30" y="81" width="20" height="14" fill="#b8956a"/>
  <rect x="50" y="81" width="20" height="14" fill="#c57546"/>
  <rect x="70" y="81" width="20" height="14" fill="#d4836a"/>
  <!-- C overlay -->
  <path d="M72,54 A16,16 0 1,0 72,80" fill="none" stroke="#f9f7f4" stroke-width="4" stroke-linecap="round"/>
  <!-- Text -->
  <text x="60" y="108" text-anchor="middle" font-family="'Helvetica Neue', sans-serif" font-size="6.5" fill="#2c2c2c" font-weight="500" letter-spacing="2">CINDY'S ART</text>
</svg>
</div>

<div id="logo-14" data-name="Ink Wash Mountain" data-name-zh="水墨山居" data-desc="Chinese ink wash painting style with house among mountains">
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#f9f7f4"/>
  <!-- Far mountain -->
  <path d="M0,70 Q30,35 50,55 Q65,30 85,50 Q100,38 120,65 L120,80 L0,80 Z" fill="#2c2c2c" opacity="0.08"/>
  <!-- Near mountain -->
  <path d="M0,80 Q25,55 45,70 Q58,48 75,65 Q95,50 120,75 L120,90 L0,90 Z" fill="#2c2c2c" opacity="0.15"/>
  <!-- Simple house -->
  <polygon points="60,42 48,52 72,52" fill="none" stroke="#2c2c2c" stroke-width="1.5"/>
  <rect x="50" y="52" width="20" height="16" fill="none" stroke="#2c2c2c" stroke-width="1.5"/>
  <!-- C door -->
  <path d="M64,56 A5,5 0 1,0 64,64" fill="none" stroke="#c57546" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Ink C at top -->
  <path d="M78,15 C72,10 52,12 48,22 C45,30 48,38 55,40" fill="none" stroke="#2c2c2c" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Ground -->
  <path d="M10,90 Q40,85 60,88 Q80,91 110,87" fill="none" stroke="#2c2c2c" stroke-width="1" opacity="0.3"/>
  <!-- Chinese text -->
  <text x="15" y="30" font-family="'SimSun', 'Songti SC', serif" font-size="8" fill="#2c2c2c" opacity="0.5">畫</text>
  <!-- Text -->
  <text x="60" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="6.5" fill="#2c2c2c">Cindy's Art Studio</text>
  <text x="60" y="115" text-anchor="middle" font-family="'SimSun', serif" font-size="5" fill="#2c2c2c" opacity="0.6">Cindy 畫室</text>
</svg>
</div>

<div id="logo-15" data-name="Modern Split" data-name-zh="現代分割" data-desc="Modern split-screen design with C on one side and house on the other">
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#f9f7f4"/>
  <!-- Left half -->
  <rect x="12" y="15" width="44" height="75" fill="#2a3a4a"/>
  <!-- Right half -->
  <rect x="64" y="15" width="44" height="75" fill="#6a9e8c"/>
  <!-- Large C on left -->
  <path d="M48,35 C42,28 28,30 26,45 C24,58 28,70 38,74 C44,76 48,73 48,73" fill="none" stroke="#f9f7f4" stroke-width="3.5" stroke-linecap="round"/>
  <!-- House on right -->
